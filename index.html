<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #chat-container {
      width: 100%;
      max-width: 720px;
      height: 90vh;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-header {
      padding: 16px 20px;
      background: #1a1a2e;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #1a1a2e;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #f0f2f5;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }

    .message.loading {
      align-self: flex-start;
      background: #f0f2f5;
      color: #888;
      font-style: italic;
    }

    #input-area {
      display: flex;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid #e5e7eb;
      background: #fff;
    }

    #user-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      resize: none;
      font-family: inherit;
      line-height: 1.4;
      max-height: 120px;
    }

    #user-input:focus { border-color: #1a1a2e; }

    #send-btn {
      padding: 10px 20px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      align-self: flex-end;
    }

    #send-btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    #send-btn:hover:not(:disabled) { background: #2d2d4e; }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="chat-header">Research Agent</div>
    <div id="messages"></div>
    <div id="input-area">
      <textarea id="user-input" rows="1" placeholder="Ask a question…"></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('user-input');
    const sendBtn    = document.getElementById('send-btn');

    function appendMessage(role, text) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const question = inputEl.value.trim();
      if (!question) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      appendMessage('user', question);
      const loadingEl = appendMessage('loading', 'Thinking…');

      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });

        const data = await res.json();
        loadingEl.remove();

        if (!res.ok) {
          appendMessage('assistant', `Error: ${data.error || res.statusText}`);
        } else {
          appendMessage('assistant', data.answer);
        }
      } catch (err) {
        loadingEl.remove();
        appendMessage('assistant', `Network error: ${err.message}`);
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });
  </script>
</body>
</html>
